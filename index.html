<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Especial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<audio id="musica" autoplay muted>
    <source src="lisboa4.mp3?v=1" type="audio/mpeg">
</audio>

<div id="tela1" class="tela fade">
    <div class="bloco-principal">
        <h1>Lorena, voce aceita se casar comigo?</h1>
        <p class="subtitulo">Prometo te escolher todos os dias, em cada fase da nossa vida.</p>
        <div class="botoes">
            <button id="btnSim" class="btn">Sim</button>
            <button id="btnNao" class="btn">Nao</button>
        </div>
    </div>
</div>

<div id="tela2" class="tela escondido fade">
    <div class="caixa caixa-romantica">
        <p id="textoDigitado" class="texto"></p>
        <img id="gifFinal" src="fundo.gif" alt="GIF Fofo" style="display:none;">
    </div>
</div>

<div id="tela3" class="tela escondido fade">
    <div class="bloco-principal">
        <h2>Tem certeza disso?</h2>
        <div class="botoes">
            <button id="btnTela3Sim" class="btn">Sim</button>
            <button id="btnTela3Nao" class="btn">Nao</button>
        </div>
    </div>
</div>

<div id="hearts"></div>

<script src="script.js"></script>
</body>
</html>
