<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #060607;
      --bg-2: #140910;
      --line: rgba(255, 229, 238, 0.24);
      --text: #ffeff6;
      --soft: #ffd3e4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 4vw, 30px);
      color: var(--text);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 111, 168, 0.22), transparent 32%),
        radial-gradient(circle at 78% 12%, rgba(255, 170, 120, 0.2), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    .palco {
      width: min(96vw, 1080px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(14, 8, 14, 0.64);
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.65);
      padding: clamp(14px, 2.8vw, 24px);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.9rem, 3.8vw, 3rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-wrap: balance;
    }

    p {
      margin: 8px 0 18px;
      color: var(--soft);
      font-size: clamp(0.95rem, 2vw, 1.1rem);
    }

    .acoes {
      margin-bottom: 14px;
      display: flex;
      justify-content: center;
    }

    .btn-voltar {
      display: inline-block;
      text-decoration: none;
      border: 1px solid rgba(255, 219, 232, 0.62);
      color: #fff;
      background: linear-gradient(120deg, #ff2f7b, #ff6fa8);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 22px rgba(255, 59, 132, 0.34);
      transition: transform 0.2s ease, box-shadow 0.25s ease;
    }

    .btn-voltar:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 26px rgba(255, 44, 125, 0.45);
    }

    .btn-voltar:focus-visible {
      outline: 3px solid rgba(255, 230, 241, 0.95);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(255, 86, 153, 0.28);
    }

    video {
      width: 100%;
      max-height: 76vh;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.58);
      background: #000;
    }

    @media (max-width: 768px) {
      .palco {
        border-radius: 14px;
        padding: 12px;
      }

      p {
        margin-bottom: 12px;
      }

      video {
        max-height: 68vh;
      }
    }
  </style>
</head>
<body>
  <main class="palco">
    <p>Pensa mais um pouco na sua atitude...</p>
    <div class="acoes">
      <a class="btn-voltar" href="./index.html">Voltar</a>
    </div>
    <video controls autoplay loop playsinline poster="./fundo.gif">
      <source src="./video.mp4" type="video/mp4">
      Seu navegador nao suporta video HTML5.
    </video>
  </main>
</body>
</html>
